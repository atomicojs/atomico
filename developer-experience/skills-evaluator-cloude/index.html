<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>TaskFlow — Keyboard-Centric Task Manager</title>
        <meta
            name="description"
            content="A fully keyboard-driven task management application built with Atomico web components. Navigate, nest, and reorder tasks using arrow keys."
        />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
            rel="stylesheet"
        />
        <style>
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            html,
            body {
                height: 100%;
                overflow: hidden;
                background: #080b14;
            }

            body {
                font-family: "Inter", "Segoe UI", system-ui, sans-serif;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            todo-app {
                display: block;
                height: 100vh;
            }

            /* Global noise texture overlay */
            body::before {
                content: "";
                position: fixed;
                inset: 0;
                background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
                pointer-events: none;
                z-index: 9999;
                opacity: 0.5;
            }

            /* Subtle radial glow top-left */
            body::after {
                content: "";
                position: fixed;
                top: -200px;
                left: -100px;
                width: 600px;
                height: 600px;
                background: radial-gradient(
                    circle,
                    rgba(124, 58, 237, 0.08) 0%,
                    transparent 70%
                );
                pointer-events: none;
                z-index: 0;
            }
        </style>
    </head>
    <body>
        <todo-app></todo-app>
        <script type="module" src="/src/todo-app.tsx"></script>
    </body>
</html>

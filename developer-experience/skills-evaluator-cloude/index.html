<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Flow – Atomico Task Manager</title>
    <meta name="description" content="A fully functional, elegantly crafted Task Management Application built with Atomico web components and Vite." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg-base: #0d0f14;
        --bg-surface: #13161e;
        --bg-card: #1a1e2a;
        --accent: #7c6ff7;
        --accent-glow: rgba(124, 111, 247, 0.25);
        --accent-hover: #9589fa;
        --success: #34d399;
        --danger: #f87171;
        --warning: #fbbf24;
        --text-primary: #f1f5f9;
        --text-secondary: #94a3b8;
        --text-muted: #475569;
        --border: rgba(255,255,255,0.07);
        --font: 'Inter', system-ui, sans-serif;
      }

      html, body {
        min-height: 100%;
        background: var(--bg-base);
        color: var(--text-primary);
        font-family: var(--font);
        -webkit-font-smoothing: antialiased;
      }

      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        min-height: 100vh;
        padding: 2rem 1rem 4rem;
        background: 
          radial-gradient(ellipse 80% 40% at 50% -10%, rgba(124,111,247,0.18) 0%, transparent 70%),
          var(--bg-base);
      }

      todo-app {
        display: block;
        width: 100%;
        max-width: 680px;
      }
    </style>
  </head>
  <body>
    <todo-app></todo-app>
    <script type="module" src="/sandbox/index.ts"></script>
  </body>
</html>

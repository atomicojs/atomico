<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo-Tetris: Minimalist Negative High-Contrast Game</title>
    <style>
        body {
            margin: 0;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        
        /* Modern premium scrollbars */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #000000;
        }
        ::-webkit-scrollbar-thumb {
            background: #222222;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #00e5ff;
        }
    </style>
</head>
<body>
    <tetris-game></tetris-game>
    <script type="module" src="/src/components/index.ts"></script>
</body>
</html>

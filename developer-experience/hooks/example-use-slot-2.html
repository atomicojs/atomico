<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Todo</title>
        <style>
            body {
                font-family: Arial, Helvetica, sans-serif;
            }
        </style>
        <script type="module" src="./src/example-use-slot-2.tsx"></script>
    </head>
    <body>
        <h1>Example useSlot - 2</h1>
        <example-use-slot id="eg2">
            <example-use-slot-child
                message="element - 0"
            ></example-use-slot-child>
        </example-use-slot>
        <button
            onclick="
                const p = document.createElement('example-use-slot-child');
                p.message = 'element - '+eg2.children.length
                eg2.append(p)
            "
        >
            add node
        </button>
    </body>
</html>
